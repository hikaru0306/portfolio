<!DOCTYPE html>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:#0a0710;overscroll-behavior:none}
#root{min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0;margin:0}
.relative{position:relative}.absolute{position:absolute}.fixed{position:fixed}
.inset-0{top:0;right:0;bottom:0;left:0}
.flex{display:flex}.grid{display:grid}.inline-block{display:inline-block}.block{display:block}
.flex-1{flex:1 1 0%}.flex-col{flex-direction:column}
.items-center{align-items:center}.items-stretch{align-items:stretch}
.justify-between{justify-content:space-between}.justify-center{justify-content:center}
.flex-wrap{flex-wrap:wrap}
.grid-cols-1{grid-template-columns:repeat(1,minmax(0,1fr))}

.py-1{padding-top:.25rem;padding-bottom:.25rem}.py-1\.5{padding-top:.375rem;padding-bottom:.375rem}
.py-2{padding-top:.5rem;padding-bottom:.5rem}.py-2\.5{padding-top:.625rem;padding-bottom:.625rem}
.py-3{padding-top:.75rem;padding-bottom:.75rem}.py-4{padding-top:1rem;padding-bottom:1rem}
.mb-1{margin-bottom:.25rem}.mb-2{margin-bottom:.5rem}.mb-3{margin-bottom:.75rem}.mb-4{margin-bottom:1rem}
.mt-1{margin-top:.25rem}.mt-3{margin-top:.75rem}.my-3{margin-top:.75rem;margin-bottom:.75rem}
.rounded-lg{border-radius:.5rem}.rounded-xl{border-radius:.75rem}.rounded-2xl{border-radius:1rem}.rounded-full{border-radius:9999px}
.text-center{text-align:center}.text-left{text-align:left}.text-right{text-align:right}

.text-\[9px\]{font-size:9px}.text-\[10px\]{font-size:10px}.text-\[11px\]{font-size:11px}

.leading-relaxed{line-height:1.625}
.pointer-events-none{pointer-events:none}
</style>

<body>
<div id="root"></div>
<script>
(function(){
  var R = window.React, RD = window.ReactDOM;
  if(!R || !RD){ document.getElementById('root').innerHTML = '<p style="color:#fff;padding:20px">読み込みに失敗しました。通信環境を確認して再読み込みしてください。</p>'; return; }
  var useState=R.useState, useRef=R.useRef, useEffect=R.useEffect, useCallback=R.useCallback;
  var React = R; // for compiled React.createElement / React.Fragment refs
// ===== 基本設定 =====
const SIZE = 6;
const TOTAL = SIZE * SIZE;
const P_MAX = 250;
const NUM_SPECIAL = 5; // 盤面の特殊ドロップ数（常時）
const STAR_THRESHOLD = 6; // ★：この個数以上同時消しで発動

// 階層ごとの敵（全10階）。HP200/攻40から徐々に強化
const FLOORS = Array.from({
  length: 10
}, (_, i) => ({
  hp: 200 + i * 90,
  atk: 40 + i * 8,
  name: `${i + 1}階の敵`
}));
const ATK_PER = 10,
  DEF_PER = 10,
  HEAL_PER = 1;
const DROPS = {
  0: {
    c1: "#ff7aa8",
    c2: "#c81e5a",
    glow: "#ff5d8f"
  },
  1: {
    c1: "#ffd97a",
    c2: "#d99413",
    glow: "#ffcf5d"
  },
  2: {
    c1: "#bf8cff",
    c2: "#6b2fc9",
    glow: "#a96bff"
  },
  3: {
    c1: "#5fe8d8",
    c2: "#129b8c",
    glow: "#3fd6c5"
  }
};

// 特殊ドロップ（アイテム）6種
const ITEMS = {
  star: {
    mark: "★",
    color: "#fff7d6",
    ring: "rgba(255,221,90,.95)",
    glowc: "#ffd54a",
    name: "スター",
    desc: "6個以上同時消しで効果(★の数+1)倍"
  },
  plus: {
    mark: "＋",
    color: "#eafaff",
    ring: "rgba(120,210,255,.95)",
    glowc: "#8ad8ff",
    name: "プラス",
    desc: "消した数を+1する"
  },
  three: {
    mark: "3",
    color: "#ffe1b0",
    ring: "rgba(255,150,40,.95)",
    glowc: "#ff9d2e",
    name: "トリプル",
    desc: "ちょうど3個で消すと3倍"
  },
  heal: {
    mark: "♥",
    color: "#d6ffe4",
    ring: "rgba(80,230,140,.95)",
    glowc: "#48e890",
    name: "ヒール",
    desc: "消すと10回復"
  },
  def: {
    mark: "盾",
    color: "#d6e8ff",
    ring: "rgba(90,160,255,.95)",
    glowc: "#5aa0ff",
    name: "ガード",
    desc: "消した効果の半分を防御に追加"
  },
  atk: {
    mark: "剣",
    color: "#ffd9d9",
    ring: "rgba(255,90,90,.95)",
    glowc: "#ff5a5a",
    name: "ソード",
    desc: "消した効果の半分を攻撃に追加"
  },
  atkx: {
    mark: "攻",
    color: "#ffe8cc",
    ring: "rgba(255,140,0,.95)",
    glowc: "#ff8c00",
    name: "猛攻",
    desc: "攻撃で消すと効果×2"
  },
  defx: {
    mark: "防",
    color: "#cce4ff",
    ring: "rgba(0,160,255,.95)",
    glowc: "#00a0ff",
    name: "鉄壁",
    desc: "防御で消すと効果×2"
  }
};
const ITEM_KEYS = Object.keys(ITEMS);
const ACTIONS = {
  atk: {
    label: "攻撃",
    icon: "⚔",
    per: ATK_PER,
    color: "#ff5252",
    bg: "rgba(255,82,82,.16)"
  },
  def: {
    label: "防御",
    icon: "🛡",
    per: DEF_PER,
    color: "#4d9bff",
    bg: "rgba(77,155,255,.16)"
  },
  heal: {
    label: "回復",
    icon: "✚",
    per: HEAL_PER,
    color: "#41d97a",
    bg: "rgba(65,217,122,.16)"
  }
};
const ORDER = ["atk", "def", "heal"];
let UID = 1;
const makeDrop = (special = false) => ({
  id: UID++,
  type: Math.floor(Math.random() * 4),
  special
});
const shuffle = arr => {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
};

// ===== 袋（抽選プール）=====
// owned: 各アイテムの所持数。bag: 現在袋に残っている枚数。
const initOwned = () => ({
  star: 1,
  plus: 1,
  three: 1,
  heal: 3,
  def: 3,
  atk: 3,
  atkx: 0,
  defx: 0
});
const refillBag = owned => ({
  ...owned
});
const bagTotal = bag => ITEM_KEYS.reduce((s, k) => s + bag[k], 0);
// 袋から1枚引く（破壊的にbagを減らす）。空ならowned基準でリセットしてから引く
const drawFromBag = (bagRef, ownedRef) => {
  if (bagTotal(bagRef.current) <= 0) bagRef.current = refillBag(ownedRef.current);
  const total = bagTotal(bagRef.current);
  if (total <= 0) return "star";
  let r = Math.floor(Math.random() * total);
  for (const k of ITEM_KEYS) {
    if (r < bagRef.current[k]) {
      bagRef.current = {
        ...bagRef.current,
        [k]: bagRef.current[k] - 1
      };
      return k;
    }
    r -= bagRef.current[k];
  }
  return "star";
};
const makeBoard = (bagRef, ownedRef) => {
  const cells = Array.from({
    length: TOTAL
  }, () => makeDrop(false));
  const idxs = shuffle([...Array(TOTAL).keys()]);
  for (let k = 0; k < NUM_SPECIAL; k++) cells[idxs[k]].special = drawFromBag(bagRef, ownedRef);
  return cells;
};
const findGroup = (cells, idx) => {
  const t = cells[idx].type;
  const seen = new Set();
  const ids = new Set();
  const stack = [idx];
  while (stack.length) {
    const i = stack.pop();
    if (seen.has(i)) continue;
    seen.add(i);
    if (cells[i].type !== t) continue;
    ids.add(cells[i].id);
    const r = Math.floor(i / SIZE),
      c = i % SIZE;
    if (r > 0) stack.push(i - SIZE);
    if (r < SIZE - 1) stack.push(i + SIZE);
    if (c > 0) stack.push(i - 1);
    if (c < SIZE - 1) stack.push(i + 1);
  }
  return ids;
};

// グループ効果の計算
const groupInfo = (cells, ids) => {
  const sp = {
    star: 0,
    plus: 0,
    three: 0,
    heal: 0,
    def: 0,
    atk: 0,
    atkx: 0,
    defx: 0
  };
  for (const cell of cells) {
    if (ids.has(cell.id) && cell.special) sp[cell.special]++;
  }
  const base = ids.size + sp.plus; // ＋で消去数を底上げ
  let mult = 1;
  const starOn = sp.star > 0 && base >= STAR_THRESHOLD;
  if (starOn) mult *= 1 + sp.star; // ★1→2倍, 2→3倍...
  const threeOn = ids.size === 3; // ちょうど3個（素の連結数）
  if (sp.three > 0 && threeOn) mult *= 3;
  return {
    count: ids.size,
    base,
    sp,
    mult,
    starOn,
    threeOn: threeOn && sp.three > 0
  };
};

// 効果値を action ごとに算出（攻/防/回ドロップの付与込み）
const computeEffect = (act, info) => {
  let actBoost = 1;
  if (act === "atk" && info.sp.atkx > 0) actBoost = 2;
  if (act === "def" && info.sp.defx > 0) actBoost = 2;
  const main = info.base * ACTIONS[act].per * info.mult * actBoost;
  const healMult = act === "heal" ? 10 : 1;
  const splitAtk = Math.round(info.sp.atk * main / 2 * healMult);
  const splitDef = Math.round(info.sp.def * main / 2 * healMult);
  const healBonus = info.sp.heal * 10;
  return {
    main,
    splitAtk,
    splitDef,
    healBonus
  };
};
const refill = (cells, removeIds, bagRef, ownedRef) => {
  const next = cells.slice();
  const newPositions = [];
  for (let c = 0; c < SIZE; c++) {
    const survivors = [];
    for (let r = 0; r < SIZE; r++) {
      const cell = cells[r * SIZE + c];
      if (!removeIds.has(cell.id)) survivors.push(cell);
    }
    const need = SIZE - survivors.length;
    const col = [];
    for (let k = 0; k < need; k++) col.push(makeDrop(false));
    for (const s of survivors) col.push(s);
    for (let r = 0; r < SIZE; r++) {
      next[r * SIZE + c] = col[r];
      if (r < need) newPositions.push(r * SIZE + c);
    }
  }
  let specials = 0;
  for (const cell of next) if (cell.special) specials++;
  let needSpecial = NUM_SPECIAL - specials;
  if (needSpecial > 0) {
    const np = shuffle(newPositions.slice());
    for (let k = 0; k < needSpecial && k < np.length; k++) next[np[k]] = {
      ...next[np[k]],
      special: drawFromBag(bagRef, ownedRef)
    };
  }
  return next;
};
function DropBattle() {
  const ownedRef = useRef(initOwned());
  const bagRef = useRef(refillBag(ownedRef.current));
  const [ownedView, setOwnedView] = useState({
    ...ownedRef.current
  });
  const [bagView, setBagView] = useState({
    ...bagRef.current
  });
  const syncOwned = () => {
    setOwnedView({
      ...ownedRef.current
    });
    setBagView({
      ...bagRef.current
    });
  };
  const syncBag = () => setBagView({
    ...bagRef.current
  });
  const [floor, setFloor] = useState(0);
  const floorRef = useRef(0);
  floorRef.current = floor;
  const [board, setBoard] = useState(() => makeBoard(bagRef, ownedRef));
  const [action, setAction] = useState("atk");
  const [used, setUsed] = useState(new Set());
  const [preview, setPreview] = useState(null);
  const [clearing, setClearing] = useState(new Set());
  const [locked, setLocked] = useState(false);
  const [pHP, setPHP_] = useState(P_MAX);
  const [eHP, setEHP_] = useState(FLOORS[0].hp);
  const [eMax, setEMax] = useState(FLOORS[0].hp);
  const pRef = useRef(P_MAX),
    eRef = useRef(FLOORS[0].hp);
  const setPHP = v => {
    pRef.current = v;
    setPHP_(v);
  };
  const setEHP = v => {
    eRef.current = v;
    setEHP_(v);
  };
  const [turn, setTurn] = useState(1);
  const [status, setStatus] = useState("playing"); // playing | reward | clear | lose
  const [log, setLog] = useState(["― 1階 バトル開始 ―"]);
  const [fx, setFx] = useState([]); // ターン演出 [{text,color}]
  const [rewards, setRewards] = useState([]); // 3択

  const [tv, setTv] = useState({
    atk: 0,
    def: 0,
    heal: 0
  });
  const turnRef = useRef({
    atk: 0,
    def: 0,
    heal: 0
  });
  const syncTurn = () => setTv({
    ...turnRef.current
  });
  const boardRef = useRef(board);
  const actionRef = useRef(action);
  const usedRef = useRef(used);
  const lockedRef = useRef(locked);
  const statusRef = useRef(status);
  const turnNumRef = useRef(turn);
  const pressingRef = useRef(false);
  const startGroupRef = useRef(null);
  const commitRef = useRef(() => {});
  const onDefeatRef = useRef(() => {});
  const [bagOpen, setBagOpen] = useState(false);
  actionRef.current = action;
  usedRef.current = used;
  lockedRef.current = locked;
  statusRef.current = status;
  turnNumRef.current = turn;
  const logRef = useRef(null);
  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [log]);
  const addLog = lines => setLog(p => [...p, ...lines].slice(-40));
  const commitBoard = next => {
    boardRef.current = next;
    setBoard(next);
  };

  // 演出を順番に出す（前の演出が残っていればキャンセル）
  const fxTimer = useRef(null);
  const playFx = (seq, after) => {
    if (fxTimer.current) {
      clearTimeout(fxTimer.current);
      fxTimer.current = null;
    }
    setFx([]);
    const items = Array.isArray(seq) ? seq.filter(Boolean) : [];
    let i = 0;
    const step = () => {
      if (i >= items.length) {
        fxTimer.current = setTimeout(() => {
          setFx([]);
          after && after();
        }, 700);
        return;
      }
      const item = items[i];
      setFx(prev => [...prev, item]);
      i++;
      fxTimer.current = setTimeout(step, 720);
    };
    step();
  };
  const resolveTurn = useCallback(() => {
    const {
      atk,
      def,
      heal
    } = turnRef.current;
    const seq = [];
    const logs = [`― ターン ${turnNumRef.current} 終了 ―`];
    let e = eRef.current;
    if (atk > 0) {
      e = Math.max(0, e - atk);
      seq.push({
        text: `敵に ${atk} ダメージ！`,
        color: "#ff6b6b"
      });
      logs.push(`⚔ 敵に ${atk} ダメージ`);
    }
    setEHP(e);
    if (heal > 0) {
      const before = pRef.current;
      const np = Math.min(P_MAX, before + heal);
      if (np - before > 0) {
        seq.push({
          text: `${np - before} 回復！`,
          color: "#5bd98a"
        });
        logs.push(`✚ ${np - before} 回復`);
      }
      setPHP(np);
    }
    if (e <= 0) {
      logs.push(`🏆 ${FLOORS[floorRef.current].name} を撃破！`);
      addLog(logs);
      playFx(seq, () => onDefeatRef.current());
      return;
    }
    const enemyAtk = FLOORS[floorRef.current].atk;
    const incoming = Math.max(0, enemyAtk - def);
    seq.push({
      text: `敵の攻撃 ${incoming} ダメージ！`,
      color: "#ffae42"
    });
    logs.push(def > 0 ? `🛡 防御 ${def} → 敵の攻撃 ${incoming}` : `敵の攻撃 ${incoming} ダメージ`);
    const p = Math.max(0, pRef.current - incoming);
    setPHP(p);
    addLog(logs);
    playFx(seq, () => {
      if (p <= 0) {
        setStatus("lose");
        statusRef.current = "lose";
        setLocked(true);
        lockedRef.current = true;
        return;
      }
      turnRef.current = {
        atk: 0,
        def: 0,
        heal: 0
      };
      syncTurn();
      setUsed(new Set());
      usedRef.current = new Set();
      setAction("atk");
      actionRef.current = "atk";
      setTurn(t => t + 1);
      setLocked(false);
      lockedRef.current = false;
    });
  }, []);

  // 撃破処理 → 報酬3択 or 全クリア
  const onDefeat = () => {
    if (floorRef.current >= FLOORS.length - 1) {
      setStatus("clear");
      statusRef.current = "clear";
      setLocked(true);
      lockedRef.current = true;
      return;
    }
    const picks = shuffle(ITEM_KEYS.slice()).slice(0, 3);
    setRewards(picks);
    setStatus("reward");
    statusRef.current = "reward";
    setLocked(true);
    lockedRef.current = true;
  };
  onDefeatRef.current = onDefeat;
  const chooseReward = key => {
    ownedRef.current = {
      ...ownedRef.current,
      [key]: ownedRef.current[key] + 1
    };
    bagRef.current = {
      ...bagRef.current,
      [key]: bagRef.current[key] + 1
    }; // 即座に袋にも反映
    syncOwned();
    const nf = floorRef.current + 1;
    setFloor(nf);
    floorRef.current = nf;
    const enemy = FLOORS[nf];
    setEMax(enemy.hp);
    setEHP(enemy.hp);
    commitBoard(makeBoard(bagRef, ownedRef));
    setAction("atk");
    actionRef.current = "atk";
    setUsed(new Set());
    usedRef.current = new Set();
    setPreview(null);
    setClearing(new Set());
    turnRef.current = {
      atk: 0,
      def: 0,
      heal: 0
    };
    syncTurn();
    setTurn(1);
    addLog([`― ${nf + 1}階 ${ITEMS[key].name}を獲得！ ―`]);
    setStatus("playing");
    statusRef.current = "playing";
    setLocked(false);
    lockedRef.current = false;
  };
  const commit = useCallback(idx => {
    if (lockedRef.current || statusRef.current !== "playing") return;
    const act = actionRef.current;
    if (!act || usedRef.current.has(act)) return;
    const ids = findGroup(boardRef.current, idx);
    const info = groupInfo(boardRef.current, ids);
    const eff = computeEffect(act, info);
    const next = refill(boardRef.current, ids, bagRef, ownedRef);
    turnRef.current[act] += eff.main;
    if (eff.splitAtk) turnRef.current.atk += eff.splitAtk;
    if (eff.splitDef) turnRef.current.def += eff.splitDef;
    if (eff.healBonus) turnRef.current.heal += eff.healBonus;
    syncTurn();
    const ll = [];
    if (info.starOn) ll.push(`★ ${info.base}個消し ${info.mult}倍`);else if (info.threeOn) ll.push(`3 ちょうど3個 3倍`);
    if (eff.splitAtk) ll.push(`剣 攻撃+${eff.splitAtk}`);
    if (eff.splitDef) ll.push(`盾 防御+${eff.splitDef}`);
    if (eff.healBonus) ll.push(`♥ 回復+${eff.healBonus}`);
    if (ll.length) addLog([ll.join(" / ")]);
    const newUsed = new Set(usedRef.current);
    newUsed.add(act);
    setUsed(newUsed);
    usedRef.current = newUsed;
    setClearing(new Set(ids));
    setLocked(true);
    lockedRef.current = true;
    setTimeout(() => {
      commitBoard(next);
      setClearing(new Set());
      syncBag();
      if (newUsed.size >= 3) {
        setTimeout(() => resolveTurn(), 350);
      } else {
        const nextAct = ORDER.find(a => !newUsed.has(a));
        setAction(nextAct);
        actionRef.current = nextAct;
        setLocked(false);
        lockedRef.current = false;
      }
    }, 240);
  }, [resolveTurn]);
  commitRef.current = commit;
  const cellAt = (x, y) => {
    const el = document.elementFromPoint(x, y);
    const b = el && el.closest ? el.closest("[data-idx]") : null;
    return b ? parseInt(b.getAttribute("data-idx"), 10) : null;
  };
  const makePreview = (b, idx) => {
    const ids = findGroup(b, idx);
    const info = groupInfo(b, ids);
    return {
      ids,
      over: true,
      info
    };
  };
  useEffect(() => {
    const move = e => {
      if (!pressingRef.current) return;
